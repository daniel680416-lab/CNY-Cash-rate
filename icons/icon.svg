<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>

    <!-- Logo Glow Gradient -->
    <linearGradient id="logoGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <!-- Shadow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Outer Ring Accent -->
  <rect x="12" y="12" width="488" height="488" rx="116" fill="none" stroke="rgba(99, 102, 241, 0.15)" stroke-width="4" />

  <!-- Styled CNY Symbol & Trend Graph -->
  <g transform="translate(64, 64)" filter="url(#glow)">
    <!-- Main Upward Trend Arrow Line -->
    <path d="M 64 256 L 160 176 L 256 224 L 320 128 L 272 128 M 320 128 L 320 176" 
          fill="none" 
          stroke="url(#logoGrad)" 
          stroke-width="28" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
    
    <!-- Stylized CNY ¥ Character in Background -->
    <text x="192" y="320" 
          font-family="system-ui, -apple-system, sans-serif" 
          font-size="180" 
          font-weight="900" 
          fill="rgba(255, 255, 255, 0.05)" 
          text-anchor="middle" 
          dominant-baseline="central">¥</text>

    <!-- Glowing points on the chart -->
    <circle cx="64" cy="256" r="16" fill="#6366f1" />
    <circle cx="160" cy="176" r="16" fill="#8b5cf6" />
    <circle cx="256" cy="224" r="16" fill="#d946ef" />
    <circle cx="320" cy="128" r="20" fill="#ec4899" />
  </g>
</svg>
